name: Haskell Cabal CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install GHC and Cabal
      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.5'
          cabal-version: 'latest'

      # 3. Cache dependencies to make future runs faster
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      # 4. Update the package database
      - name: Update Hackage list
        run: cabal update

      # 5. Build and run (this respects your .cabal file)
      - name: Build and Run
        run: |
          cabal build all
          cabal test
